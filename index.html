<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이번 주 당첨자는 나야 나!</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: linear-gradient(135deg, #eef2ff, #f8fafc);
      --container-bg: #ffffff;
      --text: #111827;
      --subtext: #4b5563;
      --ticket-bg: #f8fbff;
      --ticket-border: #dbeafe;
      --bonus-border: #cbd5e1;
      --bonus-label: #475569;
      --info-color: #64748b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      --toggle-bg: #e2e8f0;
      --toggle-text: #374151;
    }

    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #0f172a, #1e293b);
      --container-bg: #1e293b;
      --text: #f1f5f9;
      --subtext: #94a3b8;
      --ticket-bg: #0f172a;
      --ticket-border: #334155;
      --bonus-border: #475569;
      --bonus-label: #94a3b8;
      --info-color: #64748b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
      --toggle-bg: #334155;
      --toggle-text: #f1f5f9;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 980px;
      background: var(--container-bg);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 36px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .theme-toggle {
      background: var(--toggle-bg);
      color: var(--toggle-text);
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
    }

    .header p {
      margin: 0;
      color: var(--subtext);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 700;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .ticket {
      background: var(--ticket-bg);
      border: 1px solid var(--ticket-border);
      border-radius: 22px;
      padding: 20px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .ticket h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .ball {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .bonus-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      padding-top: 12px;
      border-top: 1px dashed var(--bonus-border);
    }

    .bonus-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--bonus-label);
    }

    .info {
      text-align: center;
      color: var(--info-color);
      margin-top: 22px;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .yellow { background: #f59e0b; }
    .blue { background: #3b82f6; }
    .red { background: #ef4444; }
    .gray { background: #6b7280; }
    .green { background: #22c55e; }
    .purple { background: #8b5cf6; }

    @media (max-width: 640px) {
      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .ball {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <button class="theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>

    <div class="header">
      <h1>로또 번호 5세트 추천기</h1>
      <p>
        버튼을 누르면 1부터 45 사이의 숫자 중에서 중복 없이<br />
        로또 번호 5세트와 보너스 번호를 추천해줍니다.
      </p>
    </div>

    <div class="actions">
      <button onclick="generateLottoSets()">번호 추천받기</button>
    </div>

    <div id="result" class="result-grid"></div>

    <div class="info">
      각 세트는 기본 번호 6개와 보너스 번호 1개로 구성됩니다.<br />
      재미로 즐겨주세요.
    </div>
  </div>

  <script>
    function getBallColor(num) {
      if (num <= 10) return 'yellow';
      if (num <= 20) return 'blue';
      if (num <= 30) return 'red';
      if (num <= 40) return 'gray';
      return 'green';
    }

    function generateSingleSet() {
      const numbers = [];

      while (numbers.length < 7) {
        const randomNum = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(randomNum)) {
          numbers.push(randomNum);
        }
      }

      const mainNumbers = numbers.slice(0, 6).sort((a, b) => a - b);
      const bonusNumber = numbers[6];

      return { mainNumbers, bonusNumber };
    }

    function generateLottoSets() {
      const result = document.getElementById('result');
      let html = '';

      for (let i = 1; i <= 5; i++) {
        const { mainNumbers, bonusNumber } = generateSingleSet();

        html += `
          <div class="ticket">
            <h2>${i}번째 추천 세트</h2>
            <div class="numbers">
              ${mainNumbers
                .map(num => `<div class="ball ${getBallColor(num)}">${num}</div>`)
                .join('')}
            </div>
            <div class="bonus-wrap">
              <span class="bonus-label">보너스</span>
              <div class="ball purple">${bonusNumber}</div>
            </div>
          </div>
        `;
      }

      result.innerHTML = html;
    }

    window.onload = generateLottoSets;

    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'light') {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️ 화이트 모드';
      } else {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '🌙 다크 모드';
      }
    }
  </script>
</body>
</html>
