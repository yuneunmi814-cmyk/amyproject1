<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-1166438034048593">
  <title>이번 주 당첨자는 나야 나!</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1166438034048593" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: linear-gradient(135deg, #eef2ff, #f8fafc);
      --container-bg: #ffffff;
      --text: #111827;
      --subtext: #4b5563;
      --ticket-bg: #f8fbff;
      --ticket-border: #dbeafe;
      --bonus-border: #cbd5e1;
      --bonus-label: #475569;
      --info-color: #64748b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      --toggle-bg: #e2e8f0;
      --toggle-text: #374151;
    }

    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #0f172a, #1e293b);
      --container-bg: #1e293b;
      --text: #f1f5f9;
      --subtext: #94a3b8;
      --ticket-bg: #0f172a;
      --ticket-border: #334155;
      --bonus-border: #475569;
      --bonus-label: #94a3b8;
      --info-color: #64748b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
      --toggle-bg: #334155;
      --toggle-text: #f1f5f9;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 980px;
      background: var(--container-bg);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 36px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .theme-toggle {
      background: var(--toggle-bg);
      color: var(--toggle-text);
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
    }

    .header p {
      margin: 0;
      color: var(--subtext);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 700;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .ticket {
      background: var(--ticket-bg);
      border: 1px solid var(--ticket-border);
      border-radius: 22px;
      padding: 20px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .ticket h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .ball {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .bonus-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      padding-top: 12px;
      border-top: 1px dashed var(--bonus-border);
    }

    .bonus-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--bonus-label);
    }

    .info {
      text-align: center;
      color: var(--info-color);
      margin-top: 22px;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .yellow { background: #f59e0b; }
    .blue { background: #3b82f6; }
    .red { background: #ef4444; }
    .gray { background: #6b7280; }
    .green { background: #22c55e; }
    .purple { background: #8b5cf6; }

    .contact-section {
      margin-top: 48px;
      border-top: 1px solid var(--ticket-border);
      padding-top: 36px;
    }

    .contact-section h2 {
      text-align: center;
      font-size: 1.4rem;
      margin: 0 0 8px;
    }

    .contact-section p {
      text-align: center;
      color: var(--subtext);
      margin: 0 0 24px;
      font-size: 0.95rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .contact-form input,
    .contact-form select,
    .contact-form textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--ticket-border);
      border-radius: 12px;
      background: var(--ticket-bg);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s ease, background 0.3s ease;
      outline: none;
    }

    .contact-form input:focus,
    .contact-form select:focus,
    .contact-form textarea:focus {
      border-color: #2563eb;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 110px;
    }

    .submit-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .form-success {
      display: none;
      text-align: center;
      color: #22c55e;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px;
    }

    .disqus-section {
      margin-top: 48px;
      border-top: 1px solid var(--ticket-border);
      padding-top: 36px;
    }

    .disqus-section h2 {
      text-align: center;
      font-size: 1.4rem;
      margin: 0 0 24px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .ball {
        width: 40px;
        height: 40px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="animal.html" style="text-decoration:none;">
        <button class="theme-toggle">🐶🐱 동물상 테스트</button>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>

    <div class="header">
      <h1>로또 번호 5세트 추천기</h1>
      <p>
        버튼을 누르면 1부터 45 사이의 숫자 중에서 중복 없이<br />
        로또 번호 5세트와 보너스 번호를 추천해줍니다.
      </p>
    </div>

    <div class="actions">
      <button onclick="generateLottoSets()">번호 추천받기</button>
    </div>

    <div id="result" class="result-grid"></div>

    <div class="info">
      각 세트는 기본 번호 6개와 보너스 번호 1개로 구성됩니다.<br />
      재미로 즐겨주세요.
    </div>

    <div style="margin-top:28px; text-align:center;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-1166438034048593"
           data-ad-slot="auto"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="contact-section">
      <h2>제휴 문의</h2>
      <p>광고, 제휴, 협업 관련 문의를 남겨주시면 검토 후 연락드립니다.</p>
      <form class="contact-form" id="contactForm" action="https://formspree.io/f/xnjlvpqn" method="POST">
        <div class="form-row">
          <input type="text" name="name" placeholder="이름 / 회사명" required />
          <input type="email" name="email" placeholder="이메일" required />
        </div>
        <select name="type" required>
          <option value="" disabled selected>문의 유형</option>
          <option value="광고">광고</option>
          <option value="제휴">제휴</option>
          <option value="협업">협업</option>
          <option value="기타">기타</option>
        </select>
        <textarea name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
      <div class="form-success" id="formSuccess">문의가 접수되었습니다. 감사합니다!</div>
    </div>

    <div class="disqus-section">
      <h2>댓글</h2>
      <div id="disqus_thread"></div>
    </div>
  </div>

  <script>
    function getBallColor(num) {
      if (num <= 10) return 'yellow';
      if (num <= 20) return 'blue';
      if (num <= 30) return 'red';
      if (num <= 40) return 'gray';
      return 'green';
    }

    function generateSingleSet() {
      const numbers = [];

      while (numbers.length < 7) {
        const randomNum = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(randomNum)) {
          numbers.push(randomNum);
        }
      }

      const mainNumbers = numbers.slice(0, 6).sort((a, b) => a - b);
      const bonusNumber = numbers[6];

      return { mainNumbers, bonusNumber };
    }

    function generateLottoSets() {
      const result = document.getElementById('result');
      let html = '';

      for (let i = 1; i <= 5; i++) {
        const { mainNumbers, bonusNumber } = generateSingleSet();

        html += `
          <div class="ticket">
            <h2>${i}번째 추천 세트</h2>
            <div class="numbers">
              ${mainNumbers
                .map(num => `<div class="ball ${getBallColor(num)}">${num}</div>`)
                .join('')}
            </div>
            <div class="bonus-wrap">
              <span class="bonus-label">보너스</span>
              <div class="ball purple">${bonusNumber}</div>
            </div>
          </div>
        `;
      }

      result.innerHTML = html;
    }

    window.onload = generateLottoSets;

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);
      const res = await fetch(form.action, { method: 'POST', body: data, headers: { Accept: 'application/json' } });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('formSuccess').style.display = 'block';
      }
    });

    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'light') {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️ 화이트 모드';
      } else {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '🌙 다크 모드';
      }
    }
  </script>

</html>
